<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHY MEAD</title>
    <link href="https://fonts.googleapis.com/css2?family=Stardos+Stencil:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FFD700; /* Bee Yellow */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace; /* Fallback for stencil feel */
            overflow: hidden;
            position: relative;
        }
        .container {
            text-align: center;
            z-index: 1;
        }
        h1 {
            font-family: 'Stardos Stencil', cursive;
            font-size: 8rem;
            color: #000; /* Bee Black */
            text-transform: uppercase;
            letter-spacing: 10px;
            margin: 0;
            text-shadow: 4px 4px 0px #B8860B;
        }
        .bee {
            position: absolute;
            font-size: 3rem;
            animation: fly 5s infinite ease-in-out;
        }
        @keyframes fly {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(100px, -50px) rotate(10deg); }
            50% { transform: translate(200px, 0px) rotate(0deg); }
            75% { transform: translate(100px, 50px) rotate(-10deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .honeycomb {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="56" height="100" viewBox="0 0 56 100"><polygon points="28,0 56,14 56,42 28,56 0,42 0,14" fill="none" stroke="%23B8860B" stroke-width="2"/></svg>');
            background-size: 56px 100px;
            opacity: 0.3;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="honeycomb"></div>
    <div class="container">
        <h1>WHY MEAD</h1>
    </div>
    <div class="bee" style="top: 20%; left: 20%;">🐝</div>
    <div class="bee" style="top: 70%; left: 80%; animation-delay: -2s;">🐝</div>
    <div class="bee" style="top: 30%; left: 70%; animation-delay: -4s;">🐝</div>
</body>
</html>
