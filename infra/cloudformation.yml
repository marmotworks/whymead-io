AWSTemplateFormatVersion: '2010-09-09'
Description: Infrastructure for whymead.io - Static website with CloudFront, S3, Route53, and ACM

Parameters:
  DomainName:
    Type: String
    Default: whymead.io
    Description: The primary domain name for the website

  HostedZoneId:
    Type: String
    Default: Z1047891W4VAY5MAROPO
    Description: Route53 Hosted Zone ID for the domain

  ACMCertificateArn:
    Type: String
    Default: arn:aws:acm:us-east-1:309229301022:certificate/a4a2a7cd-4c8f-4329-b95c-599ed7452098
    Description: ACM Certificate ARN for HTTPS (must be in us-east-1 for CloudFront)

  WebsiteContentBucket:
    Type: String
    Default: why-meet-io
    Description: S3 bucket name for website content (must be globally unique)

  NotificationEmail:
    Type: String
    Default: mike@beef.tips
    Description: Email address to receive daily flavor request notifications

Resources:
  # S3 Bucket for static website hosting
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref WebsiteContentBucket
      WebsiteConfiguration:
        IndexDocument: index.html
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteNonCurrentVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      Tags:
        - Key: Name
          Value: !Sub '${DomainName}-website'
        - Key: Environment
          Value: production

  # Bucket Policy - allows CloudFront OAI to read objects
  BucketPolicy:
     Type: AWS::S3::BucketPolicy
     Properties:
       Bucket: !Ref WebsiteContentBucket
       PolicyDocument:
         Version: '2012-10-17'
         Statement:
           - Effect: Allow
             Principal:
               AWS: !Sub 'arn:aws:iam::cloudfront:user/CloudFront Origin Access Identity ${CloudFrontOAI}'
             Action: s3:GetObject
             Resource: !Sub 'arn:aws:s3:::${WebsiteContentBucket}/*'

  # CloudFront Origin Access Identity
  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
         Comment: !Sub 'OAI for ${DomainName}'

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn:
      - BucketPolicy
      - FlavorApiDeployment
    Properties:
      DistributionConfig:
         Enabled: true
         Comment: !Sub 'CloudFront distribution for ${DomainName}'
         DefaultRootObject: index.html
         Aliases:
           - !Ref DomainName
         Origins:
           - Id: S3Origin
             DomainName: !Sub '${WebsiteContentBucket}.s3.amazonaws.com'
             S3OriginConfig:
               OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${CloudFrontOAI}'
           - Id: ApiGatewayOrigin
             DomainName: !Sub '${FlavorApi}.execute-api.${AWS::Region}.amazonaws.com'
             CustomOriginConfig:
               HTTPPort: 80
               HTTPSPort: 443
               OriginProtocolPolicy: https-only
               OriginSSLProtocols:
                 - TLSv1.2
         DefaultCacheBehavior:
           AllowedMethods:
             - GET
             - HEAD
             - OPTIONS
           CachedMethods:
             - GET
             - HEAD
           ForwardedValues:
             QueryString: false
             Cookies:
               Forward: none
           TargetOriginId: S3Origin
           ViewerProtocolPolicy: redirect-to-https
           MinTTL: 0
           DefaultTTL: 86400
           MaxTTL: 31536000
           ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
         CacheBehaviors:
           - PathPattern: /v1/*
             AllowedMethods:
               - GET
               - HEAD
               - OPTIONS
               - POST
               - PUT
               - PATCH
               - DELETE
             CachedMethods:
               - GET
               - HEAD
               - OPTIONS
             ForwardedValues:
               QueryString: true
               Cookies:
                 Forward: none
             TargetOriginId: ApiGatewayOrigin
             ViewerProtocolPolicy: redirect-to-https
             MinTTL: 0
             DefaultTTL: 0
             MaxTTL: 0
             ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
         ViewerCertificate:
           AcmCertificateArn: !Ref ACMCertificateArn
           SslSupportMethod: sni-only
           MinimumProtocolVersion: TLSv1.2_2021
         HttpVersion: http2
         PriceClass: PriceClass_100

  # Security Headers Response Headers Policy
  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: 'whymeadio-security-headers-policy'
        Comment: Security headers for whymead.io
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: no-referrer
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Override: true
          XSSProtection:
            Protection: true
            ModeBlock: true
            Override: true

  # Route53 A Record (Alias to CloudFront)
  Route53ARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  # Route53 AAAA Record (Alias to CloudFront for IPv6)
  Route53AAAARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  # ============================================
  # Backend Infrastructure for Flavor Requests
  # ============================================

  # DynamoDB Table for flavor requests
  FlavorRequestsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: WHY-Mead-FlavorRequests
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      Tags:
        - Key: Name
          Value: WHY-Mead-FlavorRequests
        - Key: Environment
          Value: production

  # IAM Role for Flavor Request Lambda
  FlavorRequestLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FlavorRequestLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt FlavorRequestsTable.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                Resource: '*'

  # Lambda Function for handling flavor request submissions
  FlavorRequestLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: WHY-Mead-FlavorRequestHandler
      Runtime: python3.12
      Handler: flavor_request_handler.handler
      MemorySize: 128
      Timeout: 30
      Role: !GetAtt FlavorRequestLambdaRole.Arn
      Code:
        S3Bucket: whymead-io-deployments
        S3Key: lambda-functions.zip
      Environment:
        Variables:
          FLAVOR_REQUESTS_TABLE: !Ref FlavorRequestsTable
      Tags:
        - Key: Name
          Value: WHY-Mead-FlavorRequestHandler
        - Key: Environment
          Value: production

  # API Gateway for flavor request endpoint
  FlavorApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: WHY-Mead-FlavorApi
      Description: API for handling flavor requests
      EndpointConfiguration:
        Types:
          - REGIONAL

  # API Gateway Deployment
  FlavorApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - FlavorApiMethod
      - FlavorApiOptionsMethod
    Properties:
      RestApiId: !Ref FlavorApi
      Description: Deployment of WHY-Mead-FlavorApi
      StageName: v1

  # API Gateway Resource for /flavor-request
  FlavorApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref FlavorApi
      ParentId: !GetAtt FlavorApi.RootResourceId
      PathPart: flavor-request

  # API Gateway POST method
  FlavorApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref FlavorApi
      ResourceId: !Ref FlavorApiResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: false
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FlavorRequestLambda.Arn}/invocations'
        PassthroughBehavior: WHEN_NO_MATCH
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: Empty
        - StatusCode: 400
          ResponseModels:
            application/json: Empty
        - StatusCode: 500
          ResponseModels:
            application/json: Empty

  # API Gateway OPTIONS method for CORS preflight
  FlavorApiOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref FlavorApi
      ResourceId: !Ref FlavorApiResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: ''
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        PassthroughBehavior: WHEN_NO_MATCH
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: Empty
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # Lambda permission for API Gateway
  FlavorApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FlavorRequestLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${FlavorApi}/*/*/*'

  # SNS Topic for daily notifications
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: WHY-Mead-FlavorRequests-Notifications
      Tags:
        - Key: Name
          Value: WHY-Mead-FlavorRequests-Notifications
        - Key: Environment
          Value: production

  # SNS Subscription to send notifications to email
  NotificationEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref NotificationTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  # IAM Role for Daily Notification Lambda
  DailyNotificationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DailyNotificationLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                Resource: !GetAtt FlavorRequestsTable.Arn
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref NotificationTopic
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                Resource: '*'

  # Lambda Function for daily notifications
  DailyNotificationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: WHY-Mead-DailyNotification
      Runtime: python3.12
      Handler: daily_notification.handler
      MemorySize: 128
      Timeout: 60
      Role: !GetAtt DailyNotificationLambdaRole.Arn
      Code:
        S3Bucket: whymead-io-deployments
        S3Key: lambda-functions.zip
      Environment:
        Variables:
          FLAVOR_REQUESTS_TABLE: !Ref FlavorRequestsTable
          NOTIFICATION_TOPIC_ARN: !Ref NotificationTopic
          NOTIFICATION_EMAIL: !Ref NotificationEmail
      Tags:
        - Key: Name
          Value: WHY-Mead-DailyNotification
        - Key: Environment
          Value: production

  # EventBridge Rule for daily execution (9 AM UTC)
  DailyNotificationSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: WHY-Mead-DailyNotificationSchedule
      Description: Trigger daily flavor request summary notification
      ScheduleExpression: rate(1 day)
      State: ENABLED
      Targets:
        - Arn: !GetAtt DailyNotificationLambda.Arn
          Id: DailyNotificationLambda

  # Lambda permission for EventBridge
  DailyNotificationLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DailyNotificationLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/${DailyNotificationSchedule}'

Outputs:
  WebsiteURL:
    Description: S3 Website Endpoint URL
    Value: !Sub 'http://${WebsiteContentBucket}.s3-website-us-east-1.amazonaws.com'
    Export:
      Name: whymeadio-WebsiteURL

  CloudFrontDomainName:
    Description: CloudFront Distribution Domain Name
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: whymeadio-CloudFrontDomainName

  CloudFrontDistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref CloudFrontDistribution
    Export:
      Name: whymeadio-CloudFrontDistributionId

  S3BucketName:
    Description: S3 Bucket Name
    Value: !Ref WebsiteContentBucket
    Export:
      Name: whymeadio-S3BucketName

  DomainName:
    Description: Primary Domain Name
    Value: !Ref DomainName
    Export:
      Name: whymeadio-DomainName

  ApiGatewayUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${FlavorApi}.execute-api.${AWS::Region}.amazonaws.com/v1'
    Export:
      Name: whymeadio-ApiGatewayUrl

  FlavorRequestsTable:
    Description: DynamoDB table name for flavor requests
    Value: !Ref FlavorRequestsTable
    Export:
      Name: whymeadio-FlavorRequestsTable
